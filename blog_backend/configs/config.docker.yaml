# Docker 环境配置
app:
  name: "JunBlog"
  version: "1.0.0"
  mode: "release"
  port: ":8080"

# 数据库配置
database:
  mysql:
    dsn: "junblog:your_password@tcp(mysql:3306)/junblog?charset=utf8mb4&collation=utf8mb4_unicode_ci&parseTime=True&loc=Local"
    max_idle_conns: 10
    max_open_conns: 100
  redis:
    host: "redis"
    port: 6379
    password: ""
    db: 0
    pool_size: 10

# JWT 配置
jwt:
  secret: "change_me_to_random_32_bytes_string_in_production"
  issuer: "junblog"
  access_expire: 15  # 分钟
  refresh_expire: 168  # 小时

# 日志配置
log:
  level: "info"
  filename: "logs/blog.log"
  max_size: 50  # MB
  max_backups: 10
  max_age: 30  # 天
  compress: true

# CORS 配置
cors:
  enabled: true
  allow_origins:
    - "http://39.96.91.255"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"
  expose_headers:
    - "Content-Length"
  allow_credentials: true
  max_age: 86400

# GitHub OAuth 配置
github:
  client_id: "your_github_client_id"
  client_secret: "your_github_client_secret"
  redirect_uri: "http://39.96.91.255/api/v1/auth/github/callback"
  public_url: "http://39.96.91.255"
